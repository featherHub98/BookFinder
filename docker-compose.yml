version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: bookworm-mongodb
    restart: unless-stopped
    command: mongod --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - bookworm-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: bookworm-auth-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/bookworm
      - JWT_SECRET=${JWT_SECRET:-bookworm-super-secret-jwt-key-change-in-production-2024}
      - JWT_EXPIRES_IN=60m
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - RESEND_API_KEY=${RESEND_API_KEY:-re_HLCrqT3f_5WmEJo6wxdp9L1mv58vuN9us}
      - FROM_EMAIL=${FROM_EMAIL:-onboarding@resend.dev}
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000,http://bookworm-frontend:3000
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bookworm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  book-service:
    build:
      context: ./book-service
      dockerfile: Dockerfile
    container_name: bookworm-book-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/bookworm
      - JWT_SECRET=${JWT_SECRET:-bookworm-super-secret-jwt-key-change-in-production-2024}
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000,http://bookworm-frontend:3000
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - bookworm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: bookworm-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - AUTH_SERVICE_URL=http://auth-service:3001
      - BOOK_SERVICE_URL=http://book-service:3002
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
    networks:
      - bookworm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  bookworm-network:
    driver: bridge
    name: bookworm-network

volumes:
  mongodb_data:
    driver: local
